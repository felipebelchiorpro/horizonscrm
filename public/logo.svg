<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <rect width="100" height="100" fill="#0b0b0b" rx="20" />
  <rect x="30" y="15" width="40" height="70" rx="20" fill="#B6FF00" filter="url(#glow)" />
  <rect x="50" y="15" width="40" height="70" rx="20" fill="#B6FF00" />
  <rect x="35" y="35" width="30" height="30" fill="#ffffff" transform="rotate(45 50 50)" />
</svg>
